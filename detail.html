<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#f4efe6;
}

.page{
  position:relative;
  max-width:500px;
  margin:0 auto;
}

.bg{
  width:100vw;
  height:100vh;
  object-fit:cover;
  display:block;
}

.date{
  position:absolute;
  top:150px;
  left:50%;
  transform:translateX(-50%);
  font-size:34px;
  font-family:"Hiragino Mincho ProN", serif;
  color:#4a3728;
  letter-spacing:4px;
}
  .date{
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="page">
<img src="42F56C68-29E9-40D0-BC1D-5EDE65F155C9.png" class="bg">
  <div class="date" id="date"></div>
</div>

<script>
let currentDate = new Date();

function updateDate(){
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth() + 1;
  const d = currentDate.getDate();

  document.getElementById("date").innerText =
    y + "年" + m + "月" + d + "日";
}

updateDate();
</script>

</body>
</html>
