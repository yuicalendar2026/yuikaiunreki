<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 - 開運暦</title>

<style>
body{
  margin:0;
  background:#f7f3ed;
  font-family:"Hiragino Mincho ProN", serif;
  text-align:center;
}

.date-title{
  margin-top:20px;
  font-size:20px;
}

.cover{
  width:100%;
  max-width:500px;
  margin:20px auto;
}

.cover img{
  width:100%;
  display:block;
}
</style>
</head>

<body>

<div class="date-title" id="dateTitle"></div>

<div class="cover">
  <img src="cover.jpg">
</div>

<script>
const params = new URLSearchParams(window.location.search);
const date = params.get("date");

if(date){
  const d = new Date(date);
  const text =
    d.getFullYear() + "年" +
    (d.getMonth()+1) + "月" +
    d.getDate() + "日";

  document.getElementById("dateTitle").innerText = text;
}
</script>

</body>
</html>
