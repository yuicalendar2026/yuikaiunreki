<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#f4efe6;
}

.page{
  position:relative;
  max-width:500px;
  margin:0 auto;
}

.bg{
  width:100%;
  height:auto;
  display:block;
}

.date{
  position:absolute;
  top:150px;
  left:50%;
  transform:translateX(-50%);
  font-size:34px;
  font-family:"Hiragino Mincho ProN", serif;
  color:#4a3728;
  letter-spacing:4px;
}
  .date{
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
  .moon{
  position:absolute;
  top:210px;
  left:50%;
  transform:translateX(-50%);
  font-size:16px;
  letter-spacing:2px;
  color:#6b5a4a;
}
  
</style>
</head>

<body>

<div class="page">
<img src="42F56C68-29E9-40D0-BC1D-5EDE65F155C9.png" class="bg">
  <div class="date" id="date"></div>
  <div class="moon" id="moon"></div>
  <a href="index.html" class="tap home"></a>
<a href="calendar.html" class="tap cal"></a>
<a href="houi.html" class="tap houi"></a>
<a href="numerology.html" class="tap num"></a>
<a href="message.html" class="tap msg"></a>

<script>
let currentDate = new Date();

function updateDate(){
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth() + 1;
  const d = currentDate.getDate();

  document.getElementById("date").innerText =
    y + "年" + m + "月" + d + "日";
}
<script>
function getMoonPhase(date){
  const lp = 2551443; // 月の周期（秒）
  const new_moon = new Date(1970,0,7,20,35,0); 
  const phase = ((date - new_moon) / 1000) % lp;
  const index = Math.floor((phase / lp) * 8);
  const names = ["新月","三日月","上弦","十三夜","満月","十六夜","下弦","晦"];
  return names[index];
}

function updateMoon(){
  const moon = getMoonPhase(currentDate);
  const el = document.getElementById("moon");
  if(el){ el.innerText = moon; }
}
updateMoon();
updateDate();
</script>

</body>
</html>
