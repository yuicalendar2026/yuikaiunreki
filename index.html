<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 開運暦</title>
<style>
body{margin:0;font-family:serif;background:#f8f4ed;color:#333}
.container{max-width:420px;margin:0 auto;padding:20px}
.card{background:#fff;border:2px solid #d4af37;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 8px 20px rgba(0,0,0,0.08)}
h1{text-align:center;color:#7a1f1f;letter-spacing:4px}
.center{text-align:center}
.circle{width:110px;height:110px;border-radius:50%;border:4px solid #d4af37;display:flex;align-items:center;justify-content:center;margin:15px auto;font-size:18px;color:#2f5d50}
.gold{color:#d4af37;font-size:34px;font-weight:bold}
.small{font-size:13px;color:#666}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:12px}
.day{padding:6px;text-align:center;border-radius:8px}
.today{background:#7a1f1f;color:#fff}
.lucky{background:#d4af37;color:#fff}
.footer{text-align:center;font-size:12px;color:#aaa;margin-top:20px}
button{background:#7a1f1f;color:white;border:none;padding:6px 12px;border-radius:10px;margin:5px}
</style>
</head>
<body>
<div class="container">

<h1>結 開運暦</h1>

<div class="card center">
<p id="date"></p>
<p id="rokuyo"></p>
<div class="circle" id="direction"></div>
<p class="small">今日の数秘</p>
<div class="gold" id="numerology"></div>
<p class="small" id="message"></p>
<p id="extra"></p>
</div>

<div class="card">
<div class="center">
<button onclick="changeMonth(-1)">◀</button>
<span id="monthLabel"></span>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar" id="calendar"></div>
</div>

<div class="footer">制作：結</div>

</div>

<script>
let currentMonth = new Date();

function changeMonth(offset){
  currentMonth.setMonth(currentMonth.getMonth()+offset);
  renderCalendar();
}

function showFortune(day){
  const fortunes=["大吉","中吉","小吉","吉","末吉","凶"];
  const random=fortunes[(day+currentMonth.getMonth())%fortunes.length];
  document.getElementById("fortuneResult").innerText=
    currentMonth.getFullYear()+"年"+
    (currentMonth.getMonth()+1)+"月"+
    day+"日 の運勢： "+random;
}

function renderCalendar(){
  const year=currentMonth.getFullYear();
  const month=currentMonth.getMonth();
  document.getElementById("monthLabel").innerText=
    year+"年"+(month+1)+"月";

  const calendar=document.getElementById("calendar");
  calendar.innerHTML="";

  const firstDay=new Date(year,month,1).getDay();
  const lastDate=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    const empty=document.createElement("div");
    calendar.appendChild(empty);
  }

  for(let day=1;day<=lastDate;day++){
    const cell=document.createElement("div");
    cell.innerText=day;
    cell.style.padding="10px";
    cell.style.cursor="pointer";
    cell.onclick=function(){
      showFortune(day);
    };
    calendar.appendChild(cell);
  }
}

renderCalendar();
</script>

</body>
</html>
