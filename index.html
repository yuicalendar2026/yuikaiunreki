<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結 開運暦</title>
  <style>
    body {
      margin: 0;
      font-family: serif;
      background: #f8f4ed;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
      border: 2px solid #d4af37;
    }
    h1 {
      color: #7a1f1f;
      letter-spacing: 4px;
    }
    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
      font-size: 20px;
      color: #2f5d50;
    }
    .gold {
      color: #d4af37;
      font-size: 36px;
      font-weight: bold;
    }
    .small {
      font-size: 14px;
      color: #666;
    }
    .footer {
      font-size: 12px;
      color: #aaa;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>結 開運暦</h1>
    <p id="date"></p>
    <p id="rokuyo"></p>

    <div>
      <p class="small">本日の吉方位</p>
      <div class="circle" id="direction"></div>
    </div>

    <div>
      <p class="small">今日の数秘</p>
      <div class="gold" id="numerology"></div>
      <p class="small" id="message"></p>
    </div>

    <div id="moon"></div>

    <div class="footer">
      制作：結
    </div>
  </div>

<script>
const baseDate = new Date(2026,0,1);
const directions = ["東","東南","西","東・東南","西・東","東南・西"];
const rokuyoList = ["大安","赤口","先勝","友引","先負","仏滅"];

const numerologyMessages = {
 1:"小さな一歩を踏み出してみましょう。",
 2:"人との調和を大切にしてみましょう。",
 3:"思いを言葉にしてみましょう。",
 4:"足元を整えてみましょう。",
 5:"新しいことを試してみましょう。",
 6:"身近な人に優しくしてみましょう。",
 7:"静かな時間を作ってみましょう。",
 8:"決断してみましょう。",
 9:"感謝して手放してみましょう。"
};

const newMoons = ["2026-01-19","2026-02-17","2026-03-19"];
const fullMoons = ["2026-01-03","2026-02-02","2026-03-03"];

function update() {
 const today = new Date();
 const diff = Math.floor((today - baseDate)/(1000*60*60*24));
 const num = ((diff % 9)+9)%9+1;

 document.getElementById("date").innerText = today.toLocaleDateString("ja-JP");
 document.getElementById("rokuyo").innerText = "六曜：" + rokuyoList[((diff%6)+6)%6];
 document.getElementById("direction").innerText = directions[((diff%directions.length)+directions.length)%directions.length];
 document.getElementById("numerology").innerText = num;
 document.getElementById("message").innerText = numerologyMessages[num];

 const iso = today.toISOString().split("T")[0];
 if(newMoons.includes(iso)){
   document.getElementById("moon").innerHTML = "🌑 新月です。願いを書いてみましょう。";
 } else if(fullMoons.includes(iso)){
   document.getElementById("moon").innerHTML = "🌕 満月です。感謝を伝えてみましょう。";
 }
}

update();
</script>

</body>
</html>
