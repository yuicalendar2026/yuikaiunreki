<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 - 開運暦</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Mincho ProN",serif;
  background:linear-gradient(to bottom,#f8f3ea,#e7ddcd);
  color:#3b2f2f;
}

.header{text-align:center;padding:20px;}
.logo{font-size:26px;letter-spacing:6px;font-weight:bold;}
.tagline{font-size:14px;opacity:.7;}

.date{text-align:center;margin-top:10px;}
.date-main{font-size:34px;font-weight:bold;}
.week{background:#b30000;color:white;padding:5px 10px;border-radius:20px;margin-left:6px;}
.rokuyo{margin-top:10px;padding:6px 20px;border-radius:20px;background:#fff8e6;display:inline-block;}
.taian{color:#b30000;font-weight:bold;}

.moon-box{text-align:center;margin:20px;}
.moon-circle{
  width:100px;height:100px;margin:0 auto 10px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#fff,#d4af37);
  box-shadow:0 0 15px rgba(212,175,55,.6);
}

.calendar{
  margin:20px;
  padding:15px;
  background:white;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  padding:8px 0;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
}

.today{
  background:#111;
  color:white;
}

.manbai{
  background:#f8d7da;
}

.hasEvent{
  background:#ffe4b5;
  border:1px solid #d4af37;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -5px 15px rgba(0,0,0,.1);
  font-size:12px;
}
.nav div{text-align:center;}
</style>
</head>

<body>

<div class="header">
<div class="logo">結 開運暦</div>
<div class="tagline">— 毎日に、神さまの流れを —</div>
</div>

<div class="date">
<div id="dateMain" class="date-main"></div>
<div id="week" class="week"></div><br>
<div id="rokuyo" class="rokuyo"></div>
</div>

<div class="moon-box">
<div class="moon-circle"></div>
<div id="moonText"></div>
</div>

<div class="calendar">
<h3>📅 今月のカレンダー（タップで予定入力）</h3>
<div id="calendar" class="calendar-grid"></div>
</div>

<div class="nav">
<div>🏠<br>ホーム</div>
<div>📅<br>カレンダー</div>
<div>🧭<br>吉方位</div>
<div>🔢<br>数秘</div>
<div>✉️<br>メッセージ</div>
</div>

<script>
const today=new Date();
const yyyy=today.getFullYear();
const mm=today.getMonth();
const dd=today.getDate();
const weekList=["日","月","火","水","木","金","土"];

document.getElementById("dateMain").innerText=
`${yyyy}年${mm+1}月${dd}日`;
document.getElementById("week").innerText=
weekList[today.getDay()];

// 六曜
const rokuyoList=["先勝","友引","先負","仏滅","大安","赤口"];
const base=new Date(2025,0,1);
const diff=Math.floor((today-base)/(1000*60*60*24));
const r=rokuyoList[(diff%6+6)%6];
document.getElementById("rokuyo").innerText="六曜："+r;
if(r==="大安") document.getElementById("rokuyo").classList.add("taian");

// 月齢
const moonBase=new Date(2025,0,29);
const moonAge=((today-moonBase)/(1000*60*60*24))%29.53;
document.getElementById("moonText").innerText="月齢 "+moonAge.toFixed(1);

// 一粒万倍日（簡易9日周期）
function isManbai(d){return d%9===0;}

function generateCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  const first=new Date(yyyy,mm,1).getDay();
  const last=new Date(yyyy,mm+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=last;d++){
    let cls="day";
    if(d===dd) cls+=" today";
    if(isManbai(d)) cls+=" manbai";

    const key=`${yyyy}-${mm+1}-${d}`;
    const saved=localStorage.getItem(key);
    if(saved) cls+=" hasEvent";

    cal.innerHTML+=`
      <div class="${cls}" onclick="openMemo(${d})">
        ${d}
      </div>`;
  }
}
generateCalendar();

// 予定入力
function openMemo(day){
  const key=`${yyyy}-${mm+1}-${day}`;
  const existing=localStorage.getItem(key) || "";
  const text=prompt(`${day}日の予定を入力`, existing);

  if(text===null) return;

  if(text===""){
    localStorage.removeItem(key);
  }else{
    localStorage.setItem(key,text);
  }

  generateCalendar();
}
</script>

</body>
</html>
