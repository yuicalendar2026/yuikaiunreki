<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 - 開運暦</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Mincho ProN",serif;
  background:
    radial-gradient(circle at 10% 20%,rgba(255,215,120,.25),transparent 40%),
    radial-gradient(circle at 80% 30%,rgba(255,200,120,.2),transparent 40%),
    linear-gradient(to bottom,#f8f3ea,#e7ddcd);
  color:#3b2f2f;
  overflow-x:hidden;
}

/* 金粉アニメ */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(rgba(212,175,55,.3) 1px, transparent 1px);
  background-size:40px 40px;
  animation:shine 20s linear infinite;
  pointer-events:none;
}

@keyframes shine{
  from{transform:translateY(0);}
  to{transform:translateY(-200px);}
}

/* ===== ヘッダー ===== */
.header{
  text-align:center;
  padding:25px 10px 10px;
}

.logo{
  font-size:30px;
  letter-spacing:8px;
  font-weight:bold;
}

.tagline{
  font-size:14px;
  opacity:.7;
  margin-top:5px;
}

/* ===== 日付 ===== */
.date{
  text-align:center;
  margin-top:10px;
}

.date-main{
  font-size:42px;
  font-weight:bold;
}

.week{
  display:inline-block;
  background:#b30000;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  margin-left:6px;
  font-size:16px;
}

.rokuyo{
  display:inline-block;
  margin-top:15px;
  padding:8px 25px;
  border-radius:30px;
  background:linear-gradient(135deg,#fff8e6,#f3e2c4);
  border:1px solid #d4b77a;
  font-size:20px;
}

.taian{
  color:#b30000;
  font-weight:bold;
}

/* ===== 月表示 ===== */
.moon-box{
  text-align:center;
  margin:25px;
  padding:25px;
  border-radius:25px;
  background:linear-gradient(135deg,#fff,#f4ede3);
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.moon-circle{
  width:120px;
  height:120px;
  margin:0 auto 10px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#fff8dc,#d4af37);
  box-shadow:0 0 25px rgba(212,175,55,.6);
}

/* ===== 2カラム ===== */
.section{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:0 15px 80px;
}

.card{
  background:white;
  border-radius:25px;
  padding:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card h3{
  font-size:16px;
  margin-bottom:10px;
}

/* ===== コンパス ===== */
#compass{
  width:130px;
  height:130px;
  border-radius:50%;
  margin:10px auto;
  position:relative;
  background:radial-gradient(circle,#fff 60%,#ddd);
  border:4px solid #c9a646;
}

#needle{
  width:4px;
  height:55px;
  background:#b30000;
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:50% 100%;
  transform:translate(-50%,-100%) rotate(0deg);
  transition:transform 2.5s cubic-bezier(.25,1.5,.5,1);
}

#center{
  width:10px;
  height:10px;
  background:#222;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

button{
  padding:6px 16px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
  font-size:13px;
}

/* ===== 数秘 ===== */
.number{
  font-size:48px;
  font-weight:bold;
  color:#b30000;
  text-align:center;
}

.lucky-list{
  margin-top:10px;
  font-size:14px;
}

/* ===== ナビ ===== */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -5px 15px rgba(0,0,0,.1);
  font-size:12px;
}
.nav div{text-align:center;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">結 開運暦</div>
  <div class="tagline">— 毎日に、神さまの流れを —</div>
</div>

<div class="date">
  <div id="dateMain" class="date-main"></div>
  <div id="week" class="week"></div><br>
  <div id="rokuyo" class="rokuyo"></div>
</div>

<div class="moon-box">
  <div class="moon-circle"></div>
  <div id="moonText"></div>
</div>

<div class="section">

  <div class="card">
    <h3>🔮 本日の吉方位</h3>
    <div id="compass">
      <div id="needle"></div>
      <div id="center"></div>
    </div>
    <button onclick="spin()">回す</button>
  </div>

  <div class="card">
    <h3>✨ 今日の数秘</h3>
    <div id="number" class="number"></div>
    <div id="luckyList" class="lucky-list"></div>
  </div>

</div>

<div class="nav">
  <div>🏠<br>ホーム</div>
  <div>📅<br>カレンダー</div>
  <div>🧭<br>吉方位</div>
  <div>🔢<br>数秘</div>
  <div>✉️<br>メッセージ</div>
</div>

<script>
const today=new Date();
const yyyy=today.getFullYear();
const mm=today.getMonth()+1;
const dd=today.getDate();
const weekList=["日","月","火","水","木","金","土"];

document.getElementById("dateMain").innerText=
`${yyyy}年${mm}月${dd}日`;
document.getElementById("week").innerText=weekList[today.getDay()];

const rokuyoList=["先勝","友引","先負","仏滅","大安","赤口"];
const base=new Date(2025,0,1);
const diff=Math.floor((today-base)/(1000*60*60*24));
const r=rokuyoList[(diff%6+6)%6];
const rEl=document.getElementById("rokuyo");
rEl.innerText="六曜："+r;
if(r==="大安"){rEl.classList.add("taian");}

document.getElementById("moonText").innerText="月齢表示（強化可）";

const num=(yyyy+mm+dd).toString()
.split('').reduce((a,b)=>a+Number(b),0)%9||9;
document.getElementById("number").innerText=num;

document.getElementById("luckyList").innerHTML=
r==="大安"?"🌸 大安吉日":"通常日";

let angle=0;
function spin(){
  angle+=720+Math.random()*360;
  document.getElementById("needle").style.transform=
  `translate(-50%,-100%) rotate(${angle}deg)`;
}
</script>

</body>
</html>
