<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>開運カレンダー 九星・吉方位付き</title>

<!-- iPhoneホーム画面用 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">

<!-- ビューポート設定 -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body { margin:0; font-family:'Yu Gothic',sans-serif;
  background:#fef6e4;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,200,180,0.1) 1px, transparent 1px),
    radial-gradient(circle at 80% 80%, rgba(255,200,180,0.1) 1px, transparent 1px),
    linear-gradient(to bottom, #fef6e4 0%, #fff2e0 100%);
  background-size:50px 50px,50px 50px,100% 100%;
  overflow-x:hidden;
}
#title{text-align:center;font-size:26px;margin:15px 0;color:#4b2e2e;text-shadow:1px 1px 2px rgba(0,0,0,0.1);}
#controls{text-align:center;margin-bottom:10px;}
.btn{padding:8px 14px;margin:0 5px;cursor:pointer;border:none;background:#ffd9b3;border-radius:6px;box-shadow:1px 1px 3px rgba(0,0,0,0.15);font-weight:bold;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-width:700px;margin:0 auto 40px auto;}
.date-btn{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px;font-size:14px;border-radius:10px;background: rgba(255,255,240,0.85);box-shadow:2px 2px 6px rgba(0,0,0,0.15);cursor:pointer;min-height:80px;word-break:break-word;}
.sunday{background: rgba(255,220,220,0.8);}
.saturday{background: rgba(220,235,255,0.8);}
.today{background: rgba(255,235,120,0.85);font-weight:bold;}
.info{font-size:10px;color:#4b2e2e;text-align:center;margin-top:2px;line-height:1.2em;}
.moon-symbol{font-size:16px;display:block;margin-top:2px;}
.lucky{background: rgba(200,255,200,0.85); border-radius:6px;}
#popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff8f0;border-radius:12px;box-shadow:0 0 20px rgba(0,0,0,0.3);padding:15px;z-index:100;width:90%;max-width:320px;}
#popup h3{margin-top:0;font-size:18px;color:#4b2e2e;}
#popup-info{font-size:12px;margin-top:6px;}
#popup-note{width:100%;height:50px;margin-top:8px;font-size:12px;}
#popup .close-btn{margin-top:8px;padding:6px 12px;cursor:pointer;background:#ffd9b3;border:none;border-radius:6px;font-size:14px;}
@media(max-width:480px){
  #title{font-size:22px;}
  .date-btn{font-size:12px;padding:4px;}
  .moon-symbol{font-size:14px;}
  .info{font-size:9px;}
