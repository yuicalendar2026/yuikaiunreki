<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 - 開運暦</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fdfaf6;
  text-align:center;
}

h1{
  margin-top:20px;
  font-size:24px;
}

.month-control{
  margin:20px 0;
  font-size:18px;
}
.cover{
  width:100%;
  max-width:500px;
  margin:0 auto 20px;
}

.cover img{
  width:100%;
  display:block;
  border-radius:12px;
}

.menu{
  max-width:500px;
  margin:0 auto 30px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu a{
  text-decoration:none;
  background:white;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  color:#333;
}
  .section{
  max-width:500px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  text-align:left;
}

.section h2{
  margin-top:0;
}
button{
  padding:6px 12px;
  margin:0 10px;
  font-size:16px;
  border:none;
  border-radius:6px;
  background:#c8a96a;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:15px;
  max-width:500px;
  margin:0 auto;
}

.day{
  padding:12px 0;
  background:white;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
  cursor:pointer;
}

.day:hover{
  background:#f3e9d7;
}

#fortuneResult{
  margin:25px;
  font-size:18px;
  min-height:30px;
}
</style>
</head>

<body>

<h1>結 - 開運暦</h1>
<div class="cover">
<img src="42F56C68-29E9-40D0-BC1D-5EDE65F155C9.png">
</div>

<div class="menu">
  <a href="#kippoui">🔮 今日の吉方位</a>
  <a href="#numerology">🔢 数秘（日運）</a>
  <a href="#special">🌟 吉日</a>
  <a href="#moon">🌑 月</a>
  <a href="#rokuyo">📅 六曜</a>
  <a href="#season">🍃 二十四節気</a>
</div>

<div class="month-control">
  <button onclick="changeMonth(-1)">◀</button>
  <span id="monthLabel"></span>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div id="calendar"></div>
<div class="section" id="kippoui">
  <h2>🔮 今日の吉方位</h2>
  <p>本日の吉方位は「東」。新しい挑戦に良い流れ。</p>
</div>

<div class="section" id="numerology">
  <h2>🔢 数秘（日運）</h2>
  <p>今日は「3」。創造と楽しさのエネルギー。</p>
</div>

<div class="section" id="special">
  <h2>🌟 吉日</h2>
  <p>今日は小さな願いを叶えるのに良い日。</p>
</div>

<div class="section" id="moon">
  <h2>🌑 月</h2>
  <p>満月に向かう期間。感情が高まりやすい。</p>
</div>

<div class="section" id="rokuyo">
  <h2>📅 六曜</h2>
  <p>本日は大安。物事を始めるのに最適。</p>
</div>

<div class="section" id="season">
  <h2>🍃 二十四節気</h2>
  <p>春の気配が高まる時期。</p>
</div>
<div id="fortuneResult">日付を選んでください</div>

<script>
let currentMonth = new Date();

function changeMonth(offset){
  currentMonth.setMonth(currentMonth.getMonth()+offset);
  renderCalendar();
}

function showFortune(day){
  const fortunes=["大吉","中吉","小吉","吉","末吉","凶"];
  const result=fortunes[(day+currentMonth.getMonth())%fortunes.length];

  document.getElementById("fortuneResult").innerText =
    currentMonth.getFullYear()+"年"+
    (currentMonth.getMonth()+1)+"月"+
    day+"日 の運勢： "+result;
}

function renderCalendar(){
  const year=currentMonth.getFullYear();
  const month=currentMonth.getMonth();

  document.getElementById("monthLabel").innerText =
    year+"年"+(month+1)+"月";

  const calendar=document.getElementById("calendar");
  calendar.innerHTML="";

  const firstDay=new Date(year,month,1).getDay();
  const lastDate=new Date(year,month+1,0).getDate();

  // 空白セル
  for(let i=0;i<firstDay;i++){
    const empty=document.createElement("div");
    calendar.appendChild(empty);
  }

  // 日付セル
  for(let day=1;day<=lastDate;day++){
    const cell=document.createElement("div");
    cell.className="day";
    cell.innerText=day;

    cell.onclick=function(){
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth()+1;

  const dateString =
    year + "-" +
    String(month).padStart(2,"0") + "-" +
    String(day).padStart(2,"0");

  window.location.href = "detail.html?date=" + dateString;
};

    calendar.appendChild(cell);
  }
}

renderCalendar();
</script>

</body>
</html>
