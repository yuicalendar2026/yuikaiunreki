<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 - 開運暦</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Mincho ProN", serif;
  background:#f5f1e8;
  color:#333;
  text-align:center;
}

header{
  padding:20px 0 10px;
  font-size:20px;
  letter-spacing:3px;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  margin-bottom:10px;
}

button{
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
}

#monthTitle{
  font-size:18px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  padding:0 10px 30px;
}

.day{
  background:white;
  padding:6px 2px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  font-size:13px;
  min-height:75px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.today{
  border:2px solid #b22222;
}

.week{
  font-size:12px;
  opacity:0.6;
  padding-bottom:5px;
}

.rokuyo{
  font-size:10px;
  margin-top:2px;
}

.moon{
  font-size:14px;
}

.fullmoon{
  background:#fff4c2;
  border:2px solid gold;
}

.newmoon{
  background:#222;
  color:white;
}
</style>
</head>

<body>

<header>結 - 開運暦</header>

<div class="calendar-header">
  <button onclick="changeMonth(-1)">‹</button>
  <div id="monthTitle"></div>
  <button onclick="changeMonth(1)">›</button>
</div>

<div class="calendar" id="calendar"></div>

<script>
let currentDate = new Date();
let touchStartX = 0;
let touchEndX = 0;

const rokuyoList = ["先勝","友引","先負","仏滅","大安","赤口"];

function getRokuyo(year,month,day){
  return rokuyoList[(year + month + day) % 6];
}

function getMoonAge(date){
  const base = new Date(2000,0,6,18,14);
  const diff = date - base;
  const days = diff / (1000*60*60*24);
  return (days % 29.53);
}

function getMoonIcon(age){
  if(age < 1) return "🌑";
  if(age < 7) return "🌒";
  if(age < 14) return "🌓";
  if(age < 15) return "🌕";
  if(age < 22) return "🌖";
  return "🌘";
}

function renderCalendar(){
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthTitle").innerText =
    year + "年 " + (month+1) + "月";

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();
  const today = new Date();

  const weekDays = ["日","月","火","水","木","金","土"];
  for(let i=0;i<7;i++){
    const w = document.createElement("div");
    w.className = "week";
    w.innerText = weekDays[i];
    calendar.appendChild(w);
  }

  for(let i=0;i<firstDay;i++){
    calendar.appendChild(document.createElement("div"));
  }

  for(let day=1;day<=lastDate;day++){
    const cell = document.createElement("div");
    cell.className = "day";

    const dateObj = new Date(year,month,day);
    const moonAge = getMoonAge(dateObj);
    const moonIcon = getMoonIcon(moonAge);

    cell.innerHTML = `
      <div>${day}</div>
      <div class="moon">${moonIcon}</div>
      <div class="rokuyo">${getRokuyo(year,month+1,day)}</div>
    `;

    if(
      day === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ){
      cell.classList.add("today");
    }

    if(moonAge < 1){
      cell.classList.add("newmoon");
    }
    if(moonAge > 14 && moonAge < 15){
      cell.classList.add("fullmoon");
    }

    calendar.appendChild(cell);
  }
}

function changeMonth(num){
  currentDate.setMonth(currentDate.getMonth() + num);
  renderCalendar();
}

document.addEventListener("touchstart", e=>{
  touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e=>{
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

function handleSwipe(){
  if(touchEndX < touchStartX - 50){
    changeMonth(1);
  }
  if(touchEndX > touchStartX + 50){
    changeMonth(-1);
  }
}

renderCalendar();
</script>

</body>
</html>
