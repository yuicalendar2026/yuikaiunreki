<// ===== 高精度旧暦計算 =====

// 既知の新月（2000年1月6日 18:14 UTC）
const knownNewMoon = new Date("2000-01-06T18:14:00Z");
const synodicMonth = 29.53058867;

function getMoonAge(date){
  const days = (date - knownNewMoon) / 86400000;
  return (days % synodicMonth + synodicMonth) % synodicMonth;
}

// 旧暦日（近似）
function getOldLunarDay(date){
  return Math.floor(getMoonAge(date)) + 1;
}

// 旧暦月（近似）
function getOldLunarMonth(date){
  const daysSince = (date - knownNewMoon) / 86400000;
  const monthCount = Math.floor(daysSince / synodicMonth);
  return (monthCount % 12 + 12) % 12 + 1;
}div id="season"></div>
