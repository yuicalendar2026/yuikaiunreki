<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 - 開運暦</title>

<style>
body{
  margin:0;
  font-family: "Hiragino Mincho ProN", serif;
  background:#f5f1e8;
  color:#333;
  text-align:center;
}

.container{
  padding:40px 20px;
  max-width:500px;
  margin:auto;
}

h1{
  font-size:20px;
  font-weight:normal;
  letter-spacing:2px;
}

/* ===== コンパス ===== */

#compassWrap{
  display:flex;
  justify-content:center;
  margin:40px 0;
}

#compassCircle{
  width:220px;
  height:220px;
  border-radius:50%;
  position:relative;
  background:
    radial-gradient(circle at 30% 30%, #ffffff 0%, #f1f1f1 40%, #dcdcdc 100%);
  border:6px solid #333;
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.2),
    0 12px 30px rgba(0,0,0,0.25);
}

/* 方位 */
.direction{
  position:absolute;
  font-weight:bold;
  font-size:18px;
  color:#333;
}

.north{ top:12px; left:50%; transform:translateX(-50%); }
.south{ bottom:12px; left:50%; transform:translateX(-50%); }
.east{ right:12px; top:50%; transform:translateY(-50%); }
.west{ left:12px; top:50%; transform:translateY(-50%); }

/* 針 */
#needle{
  width:4px;
  height:95px;
  background:linear-gradient(to top, #8b0000, #ff4444);
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom center;
  transform:translateX(-50%) rotate(0deg);
  border-radius:3px;
  transition:transform 1s ease;
  box-shadow:0 0 12px rgba(178,34,34,0.6);
}

/* 中心 */
#centerDot{
  width:16px;
  height:16px;
  background:#222;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* 表示テキスト */
.direction-text{
  font-size:20px;
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>結 - 開運暦</h1>

<div id="compassWrap">
  <div id="compassCircle">
    <div class="direction north">N</div>
    <div class="direction east">E</div>
    <div class="direction south">S</div>
    <div class="direction west">W</div>

    <div id="needle"></div>
    <div id="centerDot"></div>
  </div>
</div>

<div class="direction-text" id="directionText"></div>

</div>

<script>
// ===== 吉方位ロジック =====
function getLuckyDirection(date){
  const directions = [
    { name:"北", deg:0 },
    { name:"北東", deg:45 },
    { name:"東", deg:90 },
    { name:"南東", deg:135 },
    { name:"南", deg:180 },
    { name:"南西", deg:225 },
    { name:"西", deg:270 },
    { name:"北西", deg:315 }
  ];

  return directions[date.getDate() % 8];
}

// ===== 実行 =====
window.onload = function(){

  const today = new Date();
  const lucky = getLuckyDirection(today);

  const needle = document.getElementById("needle");
  const text = document.getElementById("directionText");

  if(needle){
    needle.style.transform =
      "translateX(-50%) rotate(" + lucky.deg + "deg)";
  }

  if(text){
    text.innerText = "本日の吉方位： " + lucky.name;
  }
};
</script>

</body>
</html>
