<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 - 開運暦</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Mincho ProN", serif;
  background:#f5f1e8;
  text-align:center;
}

header{
  padding:20px 0 10px;
  font-size:20px;
  letter-spacing:3px;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  margin-bottom:10px;
}

button{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  padding:0 10px 30px;
}

.day{
  background:white;
  padding:5px 2px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  font-size:12px;
  min-height:110px;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

.today{ border:2px solid #b22222; }

.week{ font-size:12px; opacity:0.6; }

.rokuyo{ font-size:10px; }

.moon{ font-size:14px; }

.lucky{ font-size:9px; color:#b22222; }

.sekki{ font-size:9px; color:#006400; }

.memo-dot{
  width:6px;
  height:6px;
  background:#b22222;
  border-radius:50%;
  position:absolute;
  bottom:5px;
}

/* モーダル */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:90%;
  max-width:350px;
  padding:20px;
  border-radius:15px;
  text-align:left;
}

textarea{
  width:100%;
  height:60px;
  margin-top:10px;
}

.memo-item{
  font-size:12px;
  margin-top:5px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<header>結 - 開運暦</header>

<div class="calendar-header">
  <button onclick="changeMonth(-1)">‹</button>
  <div id="monthTitle"></div>
  <button onclick="changeMonth(1)">›</button>
</div>

<div class="calendar" id="calendar"></div>

<!-- モーダル -->
<div class="modal" id="memoModal">
  <div class="modal-content">
    <div id="selectedDate"></div>
    <textarea id="memoInput" placeholder="メモを書く"></textarea>
    <button onclick="saveMemo()">保存</button>
    <div id="memoList"></div>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>

/* ==== 吉日データ ==== */

const tensha=["2025-03-10","2025-05-25","2025-07-24","2025-10-06","2025-12-21"];
const ichiryumanbai=["2025-03-01","2025-03-04","2025-03-07"];
const sekki={"2025-03-20":"春分","2025-06-21":"夏至"};

const rokuyoList=["先勝","友引","先負","仏滅","大安","赤口"];

let currentDate=new Date();
let selectedKey="";
let memos=JSON.parse(localStorage.getItem("memos")||"{}");

/* ==== 基本関数 ==== */

function formatDate(y,m,d){
  return y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}

function getRokuyo(y,m,d){
  return rokuyoList[(y+m+d)%6];
}

function getMoonAge(date){
  const base=new Date(2000,0,6,18,14);
  return ((date-base)/(1000*60*60*24))%29.53;
}

function getMoonIcon(age){
  if(age<1)return"🌑";
  if(age<7)return"🌒";
  if(age<14)return"🌓";
  if(age<15)return"🌕";
  if(age<22)return"🌖";
  return"🌘";
}

/* ==== カレンダー描画 ==== */

function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();

  monthTitle.innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const today=new Date();

  ["日","月","火","水","木","金","土"].forEach(d=>{
    const w=document.createElement("div");
    w.className="week";
    w.innerText=d;
    cal.appendChild(w);
  });

  for(let i=0;i<first;i++)
    cal.appendChild(document.createElement("div"));

  for(let d=1;d<=last;d++){
    const cell=document.createElement("div");
    cell.className="day";

    const dateStr=formatDate(y,m+1,d);
    const moonAge=getMoonAge(new Date(y,m,d));

    cell.innerHTML=`
      <div>${d}</div>
      <div class="moon">${getMoonIcon(moonAge)}</div>
      <div class="rokuyo">${getRokuyo(y,m+1,d)}</div>
    `;

    if(tensha.includes(dateStr))
      cell.innerHTML+=`<div class="lucky">天赦日</div>`;

    if(ichiryumanbai.includes(dateStr))
      cell.innerHTML+=`<div class="lucky">一粒万倍日</div>`;

    if(sekki[dateStr])
      cell.innerHTML+=`<div class="sekki">${sekki[dateStr]}</div>`;

    if(memos[dateStr]){
      const dot=document.createElement("div");
      dot.className="memo-dot";
      cell.appendChild(dot);
    }

    if(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear())
      cell.classList.add("today");

    cell.onclick=()=>openModal(dateStr,y,m+1,d);

    cal.appendChild(cell);
  }
}

/* ==== メモ ==== */

function openModal(key,y,m,d){
  selectedKey=key;
  memoModal.style.display="flex";
  selectedDate.innerText=`${y}年${m}月${d}日`;
  memoInput.value="";
  renderMemoList();
}

function closeModal(){
  memoModal.style.display="none";
}

function saveMemo(){
  const text=memoInput.value;
  if(!text)return;
  if(!memos[selectedKey]) memos[selectedKey]=[];
  memos[selectedKey].push(text);
  localStorage.setItem("memos",JSON.stringify(memos));
  memoInput.value="";
  renderMemoList();
  renderCalendar();
}

function renderMemoList(){
  memoList.innerHTML="";
  (memos[selectedKey]||[]).forEach((m,i)=>{
    const div=document.createElement("div");
    div.className="memo-item";
    div.innerHTML=`${m}<button onclick="deleteMemo(${i})">×</button>`;
    memoList.appendChild(div);
  });
}

function deleteMemo(i){
  memos[selectedKey].splice(i,1);
  localStorage.setItem("memos",JSON.stringify(memos));
  renderMemoList();
  renderCalendar();
}

/* ==== 月変更 ==== */

function changeMonth(n){
  currentDate.setMonth(currentDate.getMonth()+n);
  renderCalendar();
}

/* ==== スワイプ ==== */

let touchStartX=0;
let touchEndX=0;

document.addEventListener("touchstart",e=>{
  touchStartX=e.changedTouches[0].screenX;
});

document.addEventListener("touchend",e=>{
  touchEndX=e.changedTouches[0].screenX;
  if(touchEndX<touchStartX-50) changeMonth(1);
  if(touchEndX>touchStartX+50) changeMonth(-1);
});

renderCalendar();

</script>
</body>
</html>
